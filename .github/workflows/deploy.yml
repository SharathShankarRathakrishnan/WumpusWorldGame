name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pygbag
        run: pip install pygbag

      - name: Convert MP3 to OGG for web compatibility
        run: |
          ffmpeg -i sounds/arrow_sound+monster_dying.mp3 sounds/arrow_sound+monster_dying.ogg -y
          ffmpeg -i sounds/arrow_sound.mp3 sounds/arrow_sound.ogg -y
          rm sounds/arrow_sound+monster_dying.mp3 sounds/arrow_sound.mp3

      - name: Patch wumpus.py to load OGG instead of MP3 for web build
        run: |
          sed -i "s/arrow_sound+monster_dying\.mp3/arrow_sound+monster_dying.ogg/g" wumpus.py
          sed -i "s/arrow_sound\.mp3/arrow_sound.ogg/g" wumpus.py

      - name: Build with pygbag
        run: python -m pygbag --build wumpus.py; code=$?; if [ $code -ne 0 ] && [ $code -ne 3 ]; then exit $code; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
