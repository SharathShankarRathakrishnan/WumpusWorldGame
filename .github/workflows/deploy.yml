name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pygbag
        run: pip install pygbag==0.9.2

      - name: Build with pygbag
        run: python -m pygbag --build --ume_block 0 wumpus.py; code=$?; if [ $code -ne 0 ] && [ $code -ne 3 ]; then exit $code; fi

      - name: Show build output
        run: |
          echo "=== build/web contents ==="
          ls -lah build/web/ 2>/dev/null || echo "build/web NOT FOUND"
          echo "=== index.html head ==="
          head -30 build/web/index.html 2>/dev/null || echo "no index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
