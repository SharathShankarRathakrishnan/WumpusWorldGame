name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pygbag
        run: pip install pygbag==0.8.6

      - name: Stage clean game folder (entry MUST be named main.py)
        run: |
          rm -rf webgame
          mkdir webgame
          # pygbag runs assets/main.py — the entry file must be named main.py
          cp wumpus.py webgame/main.py
          # assets actually loaded by the game (root images, font, sounds/)
          cp *.png webgame/
          cp *.jpg webgame/
          cp VT323-Regular.ttf webgame/
          cp -r sounds webgame/
          ls -R webgame

      - name: Build with pygbag
        run: |
          cd webgame
          python -m pygbag --build --ume_block 0 main.py
          echo "--- verifying main.py is inside the apk ---"
          python - <<'PY'
          import glob, zipfile, sys
          apk = glob.glob('build/web/*.apk')[0]
          names = zipfile.ZipFile(apk).namelist()
          assert 'assets/main.py' in names, f"main.py missing from apk! entries={names[:10]}"
          print("OK: assets/main.py present in", apk)
          PY

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webgame/build/web
