name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The browser game is a self-contained static site in webjs/ — plain
      # HTML5/Canvas/JavaScript, no build step, no WebAssembly, no CDN. We just
      # publish that folder as-is so it loads instantly on any host.
      - name: Verify webjs build is complete
        run: |
          test -f webjs/index.html
          test -f webjs/game.js
          test -f webjs/agent.png
          test -d webjs/sounds
          echo "webjs contents:"
          ls -R webjs | head -40

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webjs
