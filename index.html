<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wumpus World by Sharath Shankar Rathakrishnan</title>
  <style>
    @font-face {
      font-family: "VT323";
      src: url("VT323-Regular.ttf") format("truetype");
      font-display: swap;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f5f5f0;
      overflow: hidden;
      font-family: "VT323", monospace;
    }
    #wrap {
      position: fixed;
      inset: 0;
    }
    /* Canvas fills the entire viewport — no letterbox bars */
    #game {
      display: block;
      background: #f5f5f0;
      image-rendering: auto;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7CFC00;
      font: 20px monospace;
      background: #111;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Wumpus World…</div>
  <div id="wrap">
    <canvas id="game" width="890" height="970"></canvas>
  </div>
  <script src="game.js"></script>
</body>
</html>
